<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#ffffff"/>
  <!-- circle outline -->
  <circle cx="32" cy="32" r="26.5" fill="none" stroke="#2d1a10" stroke-width="3.5"/>
  <!-- envelope mark: rectangle body -->
  <rect x="18" y="28" width="28" height="17" fill="none" stroke="#2d1a10" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- crossing flap lines (upper portion only, creating the M/X fold) -->
  <line x1="18" y1="28" x2="46" y2="38" stroke="#2d1a10" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="28" x2="18" y2="38" stroke="#2d1a10" stroke-width="2" stroke-linecap="round"/>
</svg>
